<!DOCTYPE html>
<html lang="zh-TW">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<HEAD>
<TITLE>食育實驗室 Nutrilab</TITLE>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=DM+Sans:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 90%;
    background: #f0faf4;
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  }

  /* ── Header wrap ── */
  .nl-wrap {
    width: 100%;
    position: relative;
    overflow: hidden;
  }

  /* animated gradient top bar */
  .nl-top-bar {
    height: 3px;
    background: linear-gradient(90deg, #43e97b, #38f9d7, #43e97b, #0bce75, #43e97b);
    background-size: 300% 100%;
    animation: waveBar 4s linear infinite;
  }
  @keyframes waveBar {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  .nl-header {
    width: 100%;
    height: 78px;
    background: #ffffff;
    border-bottom: 0.5px solid #d1f0df;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    position: relative;
    overflow: visible;
  }

  /* soft circle deco */
  .nl-deco { position: absolute; border-radius: 50%; pointer-events: none; }
  .nl-d1 { width: 120px; height: 120px; background: #e6faf0; right: 160px; top: -50px; }
  .nl-d2 { width: 60px;  height: 60px;  background: #d1f4e5; right: 100px; top: 20px; }

  .nl-home-btn {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 10px;
    background: #f0fdf6;
    border: 1px solid #b7e8cb;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    color: #18a558;
    font-size: 17px;
    transition: background 0.2s, transform 0.15s;
    position: relative; z-index: 1;
  }
  .nl-home-btn:hover { background: #ddf4ea; transform: scale(1.06); }

  .nl-divider {
    width: 1px; height: 32px;
    background: #d1f0df;
    flex-shrink: 0;
    position: relative; z-index: 1;
  }

  .nl-brand {
    flex: 1;
    display: flex; flex-direction: column; justify-content: center;
    gap: 5px; min-width: 0;
    position: relative; z-index: 1;
  }

  .nl-brand-top { display: flex; align-items: center; gap: 10px; }

  .nl-zh {
    font-size: 20px; font-weight: 900;
    color: #0d3b25;
    letter-spacing: 5px; line-height: 1;
  }

  .nl-en-badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; font-weight: 600;
    color: #18a558;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 2px 9px;
    border: 1px solid #a3dfc0;
    border-radius: 20px;
    background: #edfaf3;
    animation: badgePulse 3s ease-in-out infinite;
  }
  @keyframes badgePulse {
    0%, 100% { border-color: #a3dfc0; }
    50%       { border-color: #43e97b; }
  }

  .nl-slogan-wrap { overflow: hidden; height: 18px; line-height: 18px; }
  .nl-slogan-track {
    display: inline-block; white-space: nowrap;
    animation: nlScroll 22s linear infinite;
    font-size: 10.5px; font-weight: 300;
    color: #78c49a;
    letter-spacing: 2px;
    line-height: 18px;
    vertical-align: top;
  }
  @keyframes nlScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .nl-dot {
    display: inline-block; width: 3px; height: 3px;
    border-radius: 50%; background: #43e97b;
    margin: 0 14px; vertical-align: middle; opacity: 0.6;
  }

  /* nav */
  .nl-nav {
    display: flex; align-items: center; gap: 2px;
    flex-shrink: 0; position: relative; z-index: 1;
  }
  .nl-nav-btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px; font-weight: 400;
    color: #3a7a55;
    padding: 5px 11px;
    border-radius: 20px;
    border: none; background: transparent;
    cursor: pointer; letter-spacing: 1px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap; text-decoration: none;
    display: flex; align-items: center; gap: 5px;
  }
  .nl-nav-btn:hover { background: #edfaf3; color: #18a558; }
  .nl-nav-btn svg { width: 14px; height: 14px; }

  /* PCCU logo */
  .nl-logo-box {
    flex-shrink: 0;
    height: 38px;
    border-radius: 10px;
    border: 1px solid #b7e8cb;
    background: #f6fdf9;
    display: flex; align-items: center;
    padding: 4px 10px; gap: 6px;
    position: relative; z-index: 1;
    text-decoration: none;
  }
  .nl-logo-box:hover { background: #edfaf3; }
  .nl-logo-icon {
    width: 22px; height: 22px; border-radius: 50%;
    background: #d4f5e4;
    border: 1px solid #a3dfc0;
    display: flex; align-items: center; justify-content: center;
  }
  .nl-logo-icon svg { width: 12px; height: 12px; fill: #18a558; }
  .nl-logo-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; font-weight: 600;
    color: #3a7a55; letter-spacing: 1.5px; text-transform: uppercase;
  }

  /* tag strip */
  .nl-tag {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 5px 16px;
    background: #f6fdf9;
    border-top: 0.5px solid #d1f0df;
  }
  .nl-tag-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: #5aab7a;
    letter-spacing: 0.8px;
  }
  .nl-tag-item svg { width: 13px; height: 13px; fill: #43e97b; }
  .nl-tag-sep { color: #b7e8cb; font-size: 10px; }
</style>
</HEAD>
<BODY>

</BODY>
