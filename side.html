<HTML>
<HEAD>
<TITLE>side template</TITLE>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
  }

  /* 背景圖片：模糊放大填滿 */
  .bg-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(20px) brightness(0.6);
    transform: scale(1.1);
    z-index: 0;
  }

  /* 直式主圖片：置中顯示 */
  .main-image-wrap {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    height: 100vh;
    aspect-ratio: 9 / 16;
    z-index: 1;
  }

  .main-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* 頂部連結層 */
  .top-link {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
  }
</style>
</HEAD>
<BODY>

  <!-- 背景（模糊） -->
  <img class="bg-image" src="image/bk1.jpeg">

  <!-- 主圖片（直式置中） -->
  <div class="main-image-wrap">
    <img src="image/bk1.jpeg">
  </div>

  <!-- 頂部連結 -->
  <div class="top-link">
    <a href="index.html" target="_top">
      <img src="image/1x1_trans.gif" width=10 height=50 border=0>
    </a>
  </div>

</BODY>
</HTML>
