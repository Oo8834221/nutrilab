<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root {
    --green-deep:   #2d6a4f;
    --green-mid:    #40916c;
    --green-light:  #74c69d;
    --cream:        #f8f5ef;
    --orange:       #f4833e;
    --orange-light: #ffd166;
    --text-dark:    #1a3a2a;
    --text-white:   #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* =========================
   RWD 響應式設計
   ========================= */

/* 平板 */
@media (max-width: 1024px) {
  .hero {
    padding: 28px 20px;
  }

  .path-section {
    padding: 24px 20px;
  }

  .topnav {
    padding: 0 20px;
  }
}

/* 手機 */
@media (max-width: 768px) {

  .topnav {
    flex-direction: column;
    height: auto;
    gap: 8px;
    padding: 10px 16px;
  }

  .hero {
    padding: 20px 16px;
  }

  .hero-title {
    font-size: 20px;
    letter-spacing: 1px;
  }

  .hero-desc {
    font-size: 12px;
  }

  .path-section {
    padding: 16px 12px;
  }

  /* 卡片改成直向 */
  .path-item {
    flex-direction: column;
    gap: 10px;
  }

  .node {
    align-self: flex-start;
  }

  .card {
    width: 100%;
  }

  /* 登入卡片 */
  .login-card {
    padding: 24px 18px;
  }

  /* user email 隱藏（避免擠） */
  .user-email {
    display: none;
  }
}

/* 超小手機 */
@media (max-width: 480px) {
  .hero-title {
    font-size: 18px;
  }

  .card-inner {
    padding: 12px;
  }

  .card-title {
    font-size: 13px;
  }
}

  body {
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: #eef6f1;
    display: flex;
    flex-direction: row;
    height: 100vh;
    overflow: hidden;
  }

  /* ── 左右 side ── */
  .side {
    flex: 1;
    overflow: hidden;
  }

  .side iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── 左右 side 置中容器 ── */
  .site-wrapper {
    width: 800px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(45,106,79,0.15);
  }

  /* ══════════════════════════════
     標題區
  ══════════════════════════════ */
  .title {
    width: 100%;
    height: 68px;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--green-deep);
  }

  .title iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ══════════════════════════════
     導覽列
  ══════════════════════════════ */
  .menu {
    width: 100%;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--green-mid) 0%, var(--green-deep) 100%);
    display: flex;
    align-items: stretch;
    justify-content: center;
    position: relative;
    z-index: 200;
    /* 裝飾底線 */
    border-bottom: 3px solid transparent;
    border-image: linear-gradient(90deg, var(--orange-light), var(--orange), var(--green-light), var(--orange-light)) 1;
  }

  .menu-item {
    position: relative;
  }

  .menu-item > a {
    display: flex;
    align-items: center;
    padding: 9px 8px 7px;
    color: var(--text-white);
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }

  /* 有子選單的按鈕加箭頭 */
  .menu-item.has-sub > a::after {
    content: ' ▾';
    font-size: 10px;
    opacity: 0.7;
    transition: transform 0.2s;
    display: inline-block;
    margin-left: 2px;
  }

  .menu-item:hover > a {
    background: rgba(255,255,255,0.13);
    color: var(--orange-light);
    border-bottom-color: var(--orange-light);
  }

  .menu-item.has-sub:hover > a::after {
    transform: rotate(180deg);
  }

  /* ── 下拉選單 ── */
  .dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--cream);
    border-radius: 0 0 12px 12px;
    box-shadow: 0 8px 28px rgba(45,106,79,0.22);
    min-width: 140px;
    border-top: 3px solid var(--orange);
    overflow: hidden;
    z-index: 999;
    animation: dropIn 0.16s ease;
  }

  @keyframes dropIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .menu-item:hover .dropdown {
    display: block;
  }

  .dropdown a {
    display: block;
    padding: 9px 16px;
    font-size: 13px;
    color: var(--text-dark);
    text-decoration: none;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }

  .dropdown a + a {
    border-top: 1px solid rgba(45,106,79,0.08);
  }

  .dropdown a:hover {
    background: rgba(64,145,108,0.10);
    border-left-color: var(--green-mid);
    color: var(--green-deep);
    font-weight: 700;
  }

  /* ══════════════════════════════
     內容區
  ══════════════════════════════ */
  .content {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .content iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
